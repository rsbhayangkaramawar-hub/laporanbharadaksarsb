<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VVIP Bharadaksa - Royal Monitor Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6zBIqZLRpQPBq6psw_Z3oGZ_SK_X0rfQ",
            authDomain: "bhara-daksa.firebaseapp.com",
            databaseURL: "https://bhara-daksa-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bhara-daksa",
            storageBucket: "bhara-daksa.firebasestorage.app",
            messagingSenderId: "765829225964",
            appId: "1:765829225964:web:acb32bf51f69bfe766f4c9",
            measurementId: "G-GCYRJT9SFS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const rooms = [
            "BHARA DAKSA 01", "BHARA DAKSA 02", "BHARA DAKSA 03", "BHARA DAKSA 04",
            "BHARA DAKSA 05-A", "BHARA DAKSA 05-B", "BHARA DAKSA 06-A", "BHARA DAKSA 06-B",
            "BHARA DAKSA 07-A", "BHARA DAKSA 07-B", "BHARA DAKSA 08-A", "BHARA DAKSA 08-B"
        ];

        let patients = {};
        let currentRoom = null;

        // --- FULL SCREEN LOGIC ---
        window.toggleFullScreen = () => {
            const doc = document.documentElement;
            if (!document.fullscreenElement) {
                doc.requestFullscreen().catch(err => alert(`Gagal Fullscreen: ${err.message}`));
                document.body.classList.add('is-fullscreen');
            } else {
                document.exitFullscreen();
                document.body.classList.remove('is-fullscreen');
            }
        };

        // Detect Exit Fullscreen (tombol ESC)
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.body.classList.remove('is-fullscreen');
            }
        });

        onValue(ref(db, 'patients'), (snapshot) => {
            patients = snapshot.val() || {};
            renderGrid();
        });

        onValue(ref(db, 'doctors'), (snapshot) => {
            const docList = snapshot.val() || {};
            renderDoctorUI(docList);
        });

        window.addDoctor = () => {
            const name = document.getElementById('newDocName').value;
            if(name) {
                push(ref(db, 'doctors'), { name: name.toUpperCase() });
                document.getElementById('newDocName').value = '';
            }
        };

        window.removeDoc = (id) => {
            if(confirm("Hapus dokter dari daftar?")) remove(ref(db, `doctors/${id}`));
        };

        function renderDoctorUI(docs) {
            const listUI = document.getElementById('docList');
            const selectUI = document.getElementById('dpjpSelect');
            listUI.innerHTML = '';
            selectUI.innerHTML = '<option value="">-- PILIH DPJP --</option>';
            for(let id in docs) {
                const doc = docs[id];
                listUI.innerHTML += `<li class="flex justify-between items-center bg-white/5 p-2 rounded-lg text-[10px]"><span class="font-bold text-yellow-500">${doc.name}</span><button onclick="removeDoc('${id}')" class="text-red-500 hover:text-red-300 px-2">✕</button></li>`;
                selectUI.innerHTML += `<option value="${doc.name}">${doc.name}</option>`;
            }
        }

        window.savePatient = (e) => {
            e.preventDefault();
            const r = document.getElementById('ruangSelect').value;
            const data = {
                nama: document.getElementById('nama').value.toUpperCase(),
                umur: document.getElementById('umur').value,
                diagnosa: document.getElementById('diagnosa').value.toUpperCase(),
                penjamin: document.getElementById('penjamin').value,
                dpjp: document.getElementById('dpjpSelect').value,
                catatan: "Belum ada catatan medis."
            };
            set(ref(db, 'patients/' + r.replace(/\s+/g, '_')), data);
            document.getElementById('patientForm').reset();
        };

        window.saveNote = () => {
            update(ref(db, 'patients/' + currentRoom.replace(/\s+/g, '_')), {
                catatan: document.getElementById('noteInput').value || "Belum ada catatan medis."
            });
            closeModal();
        };

        window.checkoutPatient = () => {
            const key = currentRoom.replace(/\s+/g, '_');
            if(confirm(`Kosongkan Bed ${currentRoom}?`)) {
                remove(ref(db, 'patients/' + key));
                closeModal();
            }
        };

        function renderGrid() {
            const grid = document.getElementById('patientGrid');
            const rSelect = document.getElementById('ruangSelect');
            grid.innerHTML = ''; rSelect.innerHTML = '<option value="">-- PILIH BED --</option>';
            let count = 0;

            rooms.forEach(room => {
                const key = room.replace(/\s+/g, '_');
                const p = patients[key];
                if (p) {
                    count++;
                    grid.innerHTML += `
                        <div onclick="openModal('${room}')" class="box-bed box-terisi scale-in">
                            <div class="box-header-terisi">${room}</div>
                            <div class="p-4 flex flex-col h-full">
                                <h4 class="text-2xl font-black text-gold uppercase truncate mb-1">${p.nama}</h4>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-white font-bold text-sm">${p.umur} THN</span>
                                    <span class="bg-yellow-500/20 text-gold text-[9px] px-2 py-0.5 rounded border border-yellow-500/30 font-black">${p.penjamin}</span>
                                </div>
                                <div class="border-t border-yellow-500/20 pt-2 flex-1">
                                    <p class="text-[12px] text-white/90 italic font-medium line-clamp-2 leading-tight uppercase">${p.diagnosa}</p>
                                </div>
                                <div class="mt-2 bg-black/40 p-2 rounded-lg border-l-4 border-gold">
                                    <p class="text-[9px] text-gold font-black tracking-widest uppercase">DPJP :</p>
                                    <p class="text-[11px] text-white font-bold truncate">${p.dpjp}</p>
                                </div>
                            </div>
                        </div>`;
                } else {
                    rSelect.innerHTML += `<option value="${room}">${room}</option>`;
                    grid.innerHTML += `
                        <div class="box-bed flex items-center justify-center opacity-30 border-2 border-dashed border-white/10">
                            <div class="box-header-kosong">${room}</div>
                            <p class="text-[10px] font-black text-gray-500 tracking-[0.3em]">KOSONG</p>
                        </div>`;
                }
            });
            document.getElementById('borStat').innerText = `${count} / 12 (${Math.round((count/12)*100)}%)`;
        }

        window.openModal = (r) => {
            currentRoom = r;
            const p = patients[r.replace(/\s+/g, '_')];
            document.getElementById('modalTitle').innerText = r;
            document.getElementById('modalPatientSub').innerText = `${p.nama} (${p.umur} Thn)`;
            document.getElementById('noteInput').value = p.catatan === "Belum ada catatan medis." ? "" : p.catatan;
            document.getElementById('modalOverlay').style.display = 'flex';
        };
        window.closeModal = () => document.getElementById('modalOverlay').style.display = 'none';

        setInterval(() => {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleTimeString('id-ID', {hour12: false});
            document.getElementById('liveDay').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }, 1000);

        window.sendWhatsApp = () => {
            let msg = `*LAPORAN VVIP BHARADAKSA*%0A📊 *BOR:* ${document.getElementById('borStat').innerText}%0A%0A`;
            rooms.forEach((r, i) => {
                const p = patients[r.replace(/\s+/g, '_')];
                msg += `${i+1}. ${r}: ${p ? '*TERISI* ('+p.nama+')' : '_KOSONG_' }%0A`;
            });
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        };
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; height: 100vh; display: flex; overflow: hidden; }
        
        /* SIDEBAR */
        aside { 
            width: 22%; 
            background: linear-gradient(to bottom, #7f1d1d 0%, #b91c1c 50%, #991b1b 100%);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            border-right: 4px solid #ef4444;
            transition: 0.5s;
        }

        /* FULLSCREEN MODE OVERRIDES */
        body.is-fullscreen aside { display: none; }
        body.is-fullscreen main { width: 100%; padding: 2rem; }
        body.is-fullscreen footer { width: 100%; }
        #exitFsBtn { display: none; }
        body.is-fullscreen #exitFsBtn { display: block; position: fixed; top: 20px; right: 20px; z-index: 99; opacity: 0.3; }
        body.is-fullscreen #exitFsBtn:hover { opacity: 1; }

        .sidebar-section { background-color: rgba(0,0,0,0.3); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 1rem; margin-bottom: 1rem; }
        .input-dark { background-color: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 0.75rem; font-weight: 600; }
        
        /* CARDS */
        .box-bed { background-color: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; position: relative; height: 100%; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; overflow: hidden; }
        .box-terisi { background: linear-gradient(145deg, #1e3a8a 0%, #0f172a 100%); border: 2px solid #fbbf24; }
        .box-header-terisi { background: rgba(0,0,0,0.4); text-align: center; padding: 5px; color: #fbbf24; font-weight: 900; font-size: 0.7rem; border-bottom: 1px solid rgba(251,191,36,0.3); }
        .box-header-kosong { position: absolute; top: 0; width: 100%; text-align: center; padding: 5px; color: rgba(255,255,255,0.3); font-weight: 800; font-size: 0.7rem; }
        .text-gold { color: #fbbf24; }

        /* FOOTER */
        footer { background-color: #fbbf24; color: black; position: fixed; bottom: 0; right: 0; width: 78%; transition: 0.5s; }
        .running-text { animation: marquee 20s linear infinite; font-weight: 900; font-style: italic; white-space: nowrap; padding: 10px 0; font-size: 1.2rem; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        #modalOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 100; align-items: center; justify-content: center; }
        .scale-in { animation: scaleIn 0.2s ease-out; }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <button id="exitFsBtn" onclick="toggleFullScreen()" class="bg-red-600 text-white px-4 py-2 rounded-full font-bold text-[10px] uppercase shadow-2xl">
        <i class="fas fa-compress"></i> Keluar Fullscreen
    </button>

    <aside>
        <div class="mb-4">
            <h1 class="text-3xl font-black text-white italic leading-tight">VVIP<br><span class="text-yellow-400">BHARADAKSA</span></h1>
            <div class="mt-4 border-l-4 border-yellow-400 pl-3">
                <p id="liveDay" class="text-[10px] text-white/80 font-bold uppercase"></p>
                <p id="liveClock" class="text-3xl font-black font-mono text-white"></p>
            </div>
        </div>

        <button onclick="toggleFullScreen()" class="bg-white/20 hover:bg-white/30 text-white w-full py-3 rounded-xl font-black text-[10px] uppercase mb-4 flex items-center justify-center gap-2 transition-all">
            <i class="fas fa-tv text-lg"></i> Full Screen Monitor
        </button>

        <div class="sidebar-section">
            <h3 class="text-[10px] text-yellow-400 font-black uppercase mb-3 tracking-widest">Registrasi Pasien</h3>
            <form id="patientForm" onsubmit="savePatient(event)" class="space-y-2">
                <input type="text" id="nama" placeholder="NAMA LENGKAP" class="input-dark w-full p-2.5 rounded-xl shadow-inner" required>
                <div class="flex gap-2">
                    <input type="number" id="umur" placeholder="Umur" class="input-dark w-1/3 p-2.5 rounded-xl shadow-inner">
                    <select id="penjamin" class="input-dark w-2/3 p-2.5 rounded-xl shadow-inner">
                        <option>BPJS</option><option>UMUM</option><option>POLRI</option><option>ASURANSI</option>
                    </select>
                </div>
                <select id="dpjpSelect" class="input-dark w-full p-2.5 rounded-xl shadow-inner" required></select>
                <input type="text" id="diagnosa" placeholder="DIAGNOSA UTAMA" class="input-dark w-full p-2.5 rounded-xl shadow-inner">
                <select id="ruangSelect" class="input-dark w-full p-2.5 rounded-xl shadow-inner" required></select>
                <button type="submit" class="bg-yellow-500 hover:bg-yellow-400 text-black w-full py-3 rounded-xl font-black text-[11px] uppercase shadow-lg transition-all active:scale-95">Simpan Data</button>
            </form>
        </div>

        <div class="sidebar-section flex-1 overflow-hidden flex flex-col">
            <h3 class="text-[10px] text-yellow-400 font-black uppercase mb-2 tracking-widest">Daftar DPJP</h3>
            <div class="flex gap-1 mb-2">
                <input type="text" id="newDocName" placeholder="Dokter Baru..." class="input-dark flex-1 p-2 rounded-lg">
                <button onclick="addDoctor()" class="bg-yellow-500 text-black px-3 rounded-lg font-bold">+</button>
            </div>
            <ul id="docList" class="space-y-1 overflow-y-auto pr-1"></ul>
        </div>

        <button onclick="sendWhatsApp()" class="bg-green-600 hover:bg-green-500 w-full py-4 rounded-2xl font-black text-[10px] uppercase flex items-center justify-center gap-3 shadow-xl mt-2">
            <i class="fab fa-whatsapp text-xl"></i> Laporan WA
        </button>
    </aside>

    <main class="flex-1 flex flex-col p-6 bg-slate-950 transition-all duration-500">
        <div class="mb-4 flex justify-between items-end">
            <div>
                <span class="text-[10px] bg-red-600 px-3 py-1 rounded-full font-black uppercase tracking-[0.2em]">Live Monitoring System</span>
            </div>
            <div class="text-right">
                <span class="text-sm font-black text-white">BOR: <span id="borStat" class="text-yellow-400"></span></span>
            </div>
        </div>

        <div id="patientGrid" class="flex-1 grid grid-cols-4 grid-rows-3 gap-4 mb-14"></div>

        <footer>
            <div class="running-text">
                *** RS. BHAYANGKARA MELAYANI DENGAN SEPENUH HATI • JAGA KEBERSIHAN RUANGAN • JANGAN RIBUT DIRUANGAN RAWAT PASIEN • TAATI JAM BERKUNJUNG PASIEN • TETAP JAGA PROTOKOL KESEHATAN ***
            </div>
        </footer>
    </main>

    <div id="modalOverlay" onclick="if(event.target == this) closeModal()">
        <div class="bg-[#0f172a] border-2 border-yellow-500 p-8 rounded-[40px] w-full max-w-md">
            <h2 id="modalTitle" class="text-3xl font-black text-yellow-500 uppercase italic"></h2>
            <p id="modalPatientSub" class="text-sm text-white/60 font-bold mb-6"></p>
            <textarea id="noteInput" rows="6" class="input-dark w-full p-5 rounded-3xl mb-6 text-sm" placeholder="Catatan medis..."></textarea>
            <div class="flex gap-4 mb-8">
                <button onclick="closeModal()" class="flex-1 bg-slate-800 py-4 rounded-2xl font-black text-xs uppercase">Batal</button>
                <button onclick="saveNote()" class="flex-1 bg-yellow-500 text-black py-4 rounded-2xl font-black text-xs uppercase">Simpan</button>
            </div>
            <div class="border-t border-white/5 pt-6 flex justify-center">
                <button onclick="checkoutPatient()" class="text-red-500 border-2 border-red-500/20 px-6 py-2 rounded-xl text-[10px] font-black uppercase">🚪 Kosongkan Bed</button>
            </div>
        </div>
    </div>

</body>
</html>
