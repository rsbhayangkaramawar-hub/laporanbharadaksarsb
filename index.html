<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VVIP BHARA DAKSA - COMMAND CENTER v26.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --neon-cyan: #00f2ff; 
            --gold-glow: 0 0 15px rgba(251, 191, 36, 0.5), 0 0 5px rgba(251, 191, 36, 0.3);
            --cyan-glow: 0 0 15px rgba(6, 182, 212, 0.5), 0 0 5px rgba(6, 182, 212, 0.3);
        }
        body {
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            font-family: 'Inter', sans-serif;
            color: #e2e8f0; height: 100vh; overflow: hidden; display: flex; padding: 1.5rem; gap: 1.5rem;
        }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .font-header { font-family: 'Orbitron', sans-serif; }
        
        .patient-card { 
            cursor: pointer; 
            transition: 0.4s; 
            position: relative; 
            border-top-width: 2px;
            border-bottom-width: 2px;
            border-right-width: 2px;
        }

        .card-vvip {
            box-shadow: var(--gold-glow);
            border-color: rgba(251, 191, 36, 0.2);
        }

        .card-bd {
            box-shadow: var(--cyan-glow);
            border-color: rgba(6, 182, 212, 0.2);
        }

        .patient-card:hover { 
            transform: translateY(-5px); 
        }
        .card-vvip:hover { box-shadow: 0 5px 20px rgba(251, 191, 36, 0.6), 0 0 10px rgba(251, 191, 36, 0.4); }
        .card-bd:hover { box-shadow: 0 5px 20px rgba(6, 182, 212, 0.6), 0 0 10px rgba(6, 182, 212, 0.4); }

        .not-visite { 
            box-shadow: inset 0 0 20px rgba(239, 68, 68, 0.15); 
            border-color: rgba(239, 68, 68, 0.3);
        }
        .card-vvip.not-visite { box-shadow: var(--gold-glow), inset 0 0 20px rgba(239, 68, 68, 0.15); }
        .card-bd.not-visite { box-shadow: var(--cyan-glow), inset 0 0 20px rgba(239, 68, 68, 0.15); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0, 242, 255, 0.3); border-radius: 10px; }
        input, select, textarea { background: rgba(0,0,0,0.5) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        label { font-size: 9px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

    <aside class="w-24 glass-panel rounded-[2.5rem] flex flex-col items-center py-10 gap-8">
        <div class="w-14 h-14 bg-gradient-to-br from-indigo-600 to-blue-700 rounded-2xl rotate-45 flex items-center justify-center cursor-pointer shadow-xl mb-4" onclick="location.reload()">
            <span class="text-white text-xl font-black -rotate-45 font-header">BD</span>
        </div>
        
        <nav class="flex flex-col gap-8">
            <div onclick="openInputPasien()" class="group cursor-pointer flex flex-col items-center transition-all hover:scale-110">
                <i class="fa-solid fa-user-plus text-2xl text-cyan-400"></i>
                <p class="text-[8px] font-bold text-cyan-400 uppercase mt-1">Input</p>
            </div>
            <div onclick="toggleTVMode()" class="group cursor-pointer flex flex-col items-center transition-all hover:scale-110">
                <i id="tv-icon" class="fa-solid fa-tv text-2xl text-blue-400"></i>
                <p id="tv-text" class="text-[8px] font-bold text-blue-400 uppercase mt-1">TV Mode</p>
            </div>
            <div onclick="openKalkulator()" class="group cursor-pointer flex flex-col items-center transition-all hover:scale-110">
                <i class="fa-solid fa-calculator text-2xl text-emerald-400"></i>
                <p class="text-[8px] font-bold text-emerald-400 uppercase mt-1">Dosis</p>
            </div>
            <div onclick="kirimLaporanWA()" class="group cursor-pointer flex flex-col items-center transition-all hover:scale-110">
                <div class="w-10 h-10 bg-green-500/10 rounded-lg flex items-center justify-center border border-green-500/20">
                    <i class="fa-brands fa-whatsapp text-2xl text-green-400"></i>
                </div>
                <p class="text-[8px] font-bold text-green-400 uppercase mt-1">Report</p>
            </div>
            <div onclick="openMgmtDokter()" class="group cursor-pointer flex flex-col items-center transition-all hover:scale-110">
                <i class="fa-solid fa-user-doctor text-2xl text-fuchsia-400"></i>
                <p class="text-[8px] font-bold text-fuchsia-400 uppercase mt-1">Dokter</p>
            </div>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col gap-6">
        <header class="h-28 glass-panel rounded-[2.5rem] flex items-center px-12">
            <div>
                <h1 class="text-4xl font-header font-black text-white uppercase tracking-tighter">VVIP <span class="text-cyan-400">BHARA DAKSA</span></h1>
                <p class="text-[10px] tracking-[0.8em] text-slate-500 font-bold uppercase mt-1">Daily Ops Control</p>
            </div>
            <div class="ml-auto text-right">
                <span id="live-clock" class="text-3xl font-header font-bold text-white tracking-widest">00:00:00</span>
                <p class="text-[9px] text-green-500 font-bold uppercase mt-1">Terminal Active</p>
            </div>
        </header>
        <main id="grid-pasien" class="flex-1 grid grid-cols-2 lg:grid-cols-3 gap-6 overflow-y-auto pr-4 custom-scrollbar content-start pb-20"></main>
    </div>

    <div id="popup-menu" class="fixed left-36 top-10 w-[500px] h-[85vh] glass-panel rounded-[3rem] p-10 z-[150] opacity-0 pointer-events-none transition-all duration-300">
        <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-4">
            <h2 id="popup-title" class="font-header text-xl text-cyan-400 uppercase tracking-widest leading-none">Detail</h2>
            <button onclick="closePopup()" class="text-slate-500 font-bold text-xs hover:text-white">[TUTUP]</button>
        </div>
        <div id="modal-content" class="overflow-y-auto max-h-[72vh] pr-2 custom-scrollbar"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDR0iUObfanmCgfSaCXHbWZEi2gDxyEhBE",
            authDomain: "laporan-bhara-daksa.firebaseapp.com",
            databaseURL: "https://laporan-bhara-daksa-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "laporan-bhara-daksa",
            storageBucket: "laporan-bhara-daksa.firebasestorage.app",
            messagingSenderId: "532273007065",
            appId: "1:532273007065:web:c917977fe077cffd8571c8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Ekspos ke Global
        window.db = db;
        window.dbRef = ref;
        window.dbSet = set;
        window.dbUpdate = update;
        window.dbRemove = remove;
        window.dbOnValue = onValue;

        // Inisialisasi Sinkronisasi Realtime
        initDataSync();
    </script>

    <script>
        // --- 1. CONFIGURATION ---
        const masterRuangan = ["VVIP 01", "VVIP 02", "VVIP 03", "VVIP 04", "BHARA DAKSA 5A", "BHARA DAKSA 5B", "BHARA DAKSA 6A", "BHARA DAKSA 6B", "BHARA DAKSA 7A", "BHARA DAKSA 7B", "BHARA DAKSA 8A", "BHARA DAKSA 8B"];
        
        const specialistIcons = {
            "SP.BS": { icon: "fa-brain", color: "text-orange-500", label: "BEDAH SARAF" },
            "SP.OT": { icon: "fa-bone", color: "text-slate-200", label: "ORTHOPEDI" },
            "SP.B":  { icon: "fa-scalpel-path", color: "text-red-500", label: "BEDAH UMUM" },
            "SP.A":  { icon: "fa-baby", color: "text-pink-400", label: "ANAK" },
            "SP.PD": { icon: "fa-stethoscope", color: "text-blue-300", label: "PENYAKIT DALAM" },
            "SP.JP": { icon: "fa-heart-pulse", color: "text-red-600", label: "JANTUNG" },
            "SP.N":  { icon: "fa-microchip", color: "text-purple-400", label: "SARAF" },
            "SP.OG": { icon: "fa-person-pregnant", color: "text-teal-300", label: "OBGYN" },
            "SP.THT":{ icon: "fa-ear-listen", color: "text-orange-400", label: "THT" },
            "SP.M":  { icon: "fa-eye", color: "text-cyan-400", label: "MATA" },
            "SP.AN": { icon: "fa-lungs", color: "text-slate-400", label: "ANESTESI" },
            "DEFAULT": { icon: "fa-user-md", color: "text-amber-500", label: "DOKTER" }
        };

        let databasePasien = [];
        let daftarDokter = [];

        // --- 2. FIREBASE SYNC ---
        function initDataSync() {
            if (!window.dbOnValue) { setTimeout(initDataSync, 500); return; }

            // Sync Pasien
            window.dbOnValue(window.dbRef(window.db, 'pasien'), (snapshot) => {
                const data = snapshot.val();
                databasePasien = data ? Object.values(data) : [];
                renderGrid();
            });

            // Sync Dokter
            window.dbOnValue(window.dbRef(window.db, 'dokter'), (snapshot) => {
                const data = snapshot.val();
                daftarDokter = data ? Object.values(data) : ["dr. Budi, Sp.JP", "dr. Ani, Sp.A"];
            });
        }

        // --- 3. LOGIC HELPERS ---
        function getSpec(name) {
            if (!name) return specialistIcons.DEFAULT;
            const n = name.toUpperCase();
            for (let key in specialistIcons) {
                if (n.includes(key)) return specialistIcons[key];
            }
            return specialistIcons.DEFAULT;
        }

        function updateClock() { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('id-ID', { hour12: false }); }
        setInterval(updateClock, 1000); updateClock();

        function closePopup() { document.getElementById('popup-menu').style.opacity = '0'; document.getElementById('popup-menu').style.pointerEvents = 'none'; }
        function openPopup() { document.getElementById('popup-menu').style.opacity = '1'; document.getElementById('popup-menu').style.pointerEvents = 'auto'; }

        // --- 4. RENDERER ---
        function renderGrid() {
            const container = document.getElementById('grid-pasien');
            container.innerHTML = '';
            const sortedPasien = [...databasePasien].sort((a, b) => masterRuangan.indexOf(a.ruang) - masterRuangan.indexOf(b.ruang));

            sortedPasien.forEach(data => {
                const isElite = data.ruang.includes("VVIP");
                const pendingTasks = data.tasks ? data.tasks.filter(t => !t.done).length : 0;
                const dpjpHtml = (data.dpjp || []).map(docName => {
                    const s = getSpec(docName);
                    return `
                        <div class="flex items-center gap-2 mb-1 p-1 rounded-xl bg-white/[0.03] border border-white/[0.05]">
                            <div class="w-8 h-8 rounded-lg bg-slate-900/50 flex items-center justify-center">
                                <i class="fa-solid ${s.icon} ${s.color} text-xs"></i>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-[17px] font-bold text-slate-100 leading-tight">${docName}</span>
                                <span class="text-[11px] font-black ${s.color} uppercase tracking-tighter leading-none">${s.label}</span>
                            </div>
                        </div>`;
                }).join('');

                const card = document.createElement('div');
                card.className = `patient-card glass-panel rounded-[3rem] p-8 border-l-[6px] ${isElite ? 'border-l-amber-500 card-vvip' : 'border-l-cyan-500 card-bd'} ${!data.sudahVisite ? 'not-visite' : ''}`;
                card.onclick = () => openEditPasien(data.id);
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div class="px-5 py-1.5 rounded-xl bg-white/5 border border-white/10 text-lg font-header font-black ${isElite ? 'text-amber-400' : 'text-cyan-400'}">${data.ruang}</div>
                        <div class="flex items-center gap-2">
                            ${pendingTasks > 0 ? `<div class="px-2.5 py-1 bg-red-600 rounded-full animate-pulse flex items-center gap-1 shadow-lg shadow-red-600/20"><i class="fa-solid fa-list-check text-[10px] text-white"></i><span class="text-[10px] font-black text-white">${pendingTasks}</span></div>` : ''}
                            <div class="px-3 py-1 rounded-full text-[8px] font-black ${data.sudahVisite ? 'bg-green-500/20 text-green-400 border border-green-500/30' : 'bg-red-500/20 text-red-400 border border-red-500/30'} uppercase">${data.sudahVisite ? '● Visited' : '○ Not Visited'}</div>
                        </div>
                    </div>
                    <div class="mb-4">
                        <h3 class="text-2xl font-black text-white uppercase truncate tracking-tighter">${data.nama}</h3>
                        <p class="text-sm font-bold text-slate-500 uppercase mt-1">${data.umur} THN • <span class="${isElite ? 'text-amber-500' : 'text-cyan-500'}">${data.penjamin}</span></p>
                    </div>
                    <p class="text-md font-bold text-slate-200 uppercase mb-4">${data.diagnosa}</p>
                    <div class="border-t border-white/3 pt-4 flex flex-col">${dpjpHtml}</div>`;
                container.appendChild(card);
            });
        }

        // --- 5. ACTIONS ---
        function savePasien(e) {
            e.preventDefault();
            const id = Date.now();
            const pData = {
                id: id, nama: document.getElementById('p-nama').value,
                ruang: document.getElementById('p-ruang').value, umur: document.getElementById('p-umur').value,
                penjamin: document.getElementById('p-penjamin').value, diagnosa: document.getElementById('p-diagnosa').value,
                dpjp: Array.from(document.querySelectorAll('.p-input-doc:checked')).map(cb => cb.value),
                tasks: [], catatan: "", sudahVisite: false
            };
            window.dbSet(window.dbRef(window.db, 'pasien/' + id), pData);
            closePopup();
        }

        function saveEdit(id) { 
            const updates = {};
            updates[`pasien/${id}/catatan`] = document.getElementById('edit-catatan').value; 
            updates[`pasien/${id}/diagnosa`] = document.getElementById('edit-diagnosa').value;
            updates[`pasien/${id}/dpjp`] = Array.from(document.querySelectorAll('.edit-dpjp-check:checked')).map(cb => cb.value);
            window.dbUpdate(window.dbRef(window.db), updates);
            closePopup(); 
        }

        function toggleVisite(id, status) { window.dbUpdate(window.dbRef(window.db, `pasien/${id}`), { sudahVisite: status }); }
        
        function addTask(id) { 
            const v = document.getElementById('task-in').value; 
            if(v) { 
                const p = databasePasien.find(p => p.id === id);
                const t = p.tasks || [];
                t.push({text:v, done:false});
                window.dbUpdate(window.dbRef(window.db, `pasien/${id}`), { tasks: t });
                openEditPasien(id);
            } 
        }

        function toggleTask(id, i) {
            const p = databasePasien.find(p => p.id === id);
            p.tasks[i].done = !p.tasks[i].done;
            window.dbUpdate(window.dbRef(window.db, `pasien/${id}`), { tasks: p.tasks });
        }

        function delTask(id, i) {
            const p = databasePasien.find(p => p.id === id);
            p.tasks.splice(i,1);
            window.dbUpdate(window.dbRef(window.db, `pasien/${id}`), { tasks: p.tasks });
            openEditPasien(id);
        }

        function hapusPasien(id) { if(confirm('Hapus permanen?')) { window.dbRemove(window.dbRef(window.db, `pasien/${id}`)); closePopup(); } }

        function addDokter() { 
            const v = document.getElementById('new-doc').value; 
            if(v) { 
                const newKey = Date.now();
                window.dbSet(window.dbRef(window.db, 'dokter/' + newKey), v);
                openMgmtDokter(); 
            } 
        }

        function removeDokter(key) { 
            const dokterKeys = [];
            window.dbOnValue(window.dbRef(window.db, 'dokter'), (snap) => {
                const data = snap.val();
                for(let k in data) if(data[k] === key) window.dbRemove(window.dbRef(window.db, 'dokter/'+k));
            }, {onlyOnce: true});
            openMgmtDokter();
        }

        // --- 6. UI FORMS ---
        function openInputPasien() {
            document.getElementById('popup-title').innerText = "Register Pasien";
            const tersedia = masterRuangan.filter(r => !databasePasien.map(p => p.ruang).includes(r));
            let html = `<form onsubmit="savePasien(event)" class="space-y-4">
                <input type="text" id="p-nama" class="w-full p-4 rounded-2xl font-bold" placeholder="NAMA LENGKAP" required>
                <div class="grid grid-cols-2 gap-4">
                    <select id="p-ruang" class="p-4 rounded-2xl font-bold" required>${tersedia.map(r => `<option value="${r}">${r}</option>`).join('')}</select>
                    <input type="number" id="p-umur" class="p-4 rounded-2xl font-bold" placeholder="UMUR" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="p-penjamin" class="p-4 rounded-2xl font-bold"><option>BPJS</option><option>POLRI</option><option>UMUM</option><option>ASURANSI</option></select>
                    <input type="text" id="p-diagnosa" class="p-4 rounded-2xl font-bold" placeholder="DIAGNOSA" required>
                </div>
                <div class="grid grid-cols-1 gap-2 max-h-40 overflow-y-auto pr-2 custom-scrollbar">
                    ${daftarDokter.map(d => `<label class="flex items-center p-3 bg-white/5 rounded-xl cursor-pointer"><input type="checkbox" value="${d}" class="p-input-doc w-5 h-5 mr-3 accent-indigo-500"><span class="text-xs font-bold text-slate-300">${d}</span></label>`).join('')}
                </div>
                <button type="submit" class="w-full py-5 bg-indigo-600 rounded-2xl font-header font-bold text-white shadow-xl">DAFTARKAN PASIEN</button>
            </form>`;
            document.getElementById('modal-content').innerHTML = html; openPopup();
        }

        function openEditPasien(id) {
            const p = databasePasien.find(item => item.id === id);
            document.getElementById('popup-title').innerText = p.nama;
            let html = `<div class="space-y-6">
                <div class="flex border border-white/10 rounded-2xl overflow-hidden p-1 bg-white/5">
                    <button onclick="toggleVisite(${id}, false)" class="flex-1 py-4 font-bold rounded-xl ${!p.sudahVisite ? 'bg-red-600 shadow-lg' : 'text-slate-500'}">BELUM VISITE</button>
                    <button onclick="toggleVisite(${id}, true)" class="flex-1 py-4 font-bold rounded-xl ${p.sudahVisite ? 'bg-green-600 shadow-lg' : 'text-slate-500'}">SUDAH VISITE</button>
                </div>
                <div class="bg-white/5 p-6 rounded-3xl border border-white/10">
                    <p class="text-[10px] font-black text-emerald-400 mb-2 uppercase tracking-widest">Update Diagnosa</p>
                    <input type="text" id="edit-diagnosa" class="w-full p-4 rounded-xl text-sm font-bold bg-black/40 border border-white/10 focus:border-emerald-500 outline-none" value="${p.diagnosa}">
                </div>
                <div class="bg-white/5 p-6 rounded-3xl border border-white/10">
                    <p class="text-[10px] font-black text-fuchsia-400 mb-4 uppercase tracking-widest">Daily Tasks</p>
                    <div class="flex gap-2 mb-4"><input type="text" id="task-in" class="flex-1 p-3 rounded-xl text-sm bg-black/20" placeholder="Tugas baru..."><button onclick="addTask(${id})" class="px-5 bg-fuchsia-600 rounded-xl font-bold">+</button></div>
                    <div class="space-y-2 max-h-40 overflow-y-auto custom-scrollbar">${(p.tasks || []).map((t, i) => `<div class="flex justify-between items-center bg-black/40 p-3 rounded-xl border border-white/5"><div class="flex items-center gap-3"><input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${id}, ${i})" class="w-4 h-4 accent-green-500"><span class="text-sm ${t.done?'line-through text-slate-500':'text-slate-200'}">${t.text}</span></div><button onclick="delTask(${id}, ${i})" class="text-red-500 text-xs">✕</button></div>`).join('')}</div>
                </div>
                <div class="bg-white/5 p-6 rounded-3xl"><p class="text-[10px] font-black text-cyan-400 mb-2 uppercase tracking-widest">Catatan Medis</p><textarea id="edit-catatan" class="w-full h-20 p-4 rounded-xl text-sm bg-black/20 outline-none border border-white/5 focus:border-cyan-500">${p.catatan || ''}</textarea></div>
                <div class="bg-white/5 p-6 rounded-3xl border border-white/10"><p class="text-[10px] font-black text-indigo-400 mb-4 uppercase tracking-widest">Manajemen DPJP</p><div class="grid grid-cols-1 gap-2 max-h-40 overflow-y-auto bg-black/20 p-3 rounded-xl">${daftarDokter.map(d => `<label class="flex items-center p-2 bg-white/5 rounded-lg cursor-pointer"><input type="checkbox" value="${d}" ${(p.dpjp || []).includes(d) ? 'checked' : ''} class="edit-dpjp-check w-4 h-4 mr-3 accent-indigo-500"><span class="text-[11px] font-bold text-slate-300">${d}</span></label>`).join('')}</div></div>
                <div class="pt-2"><button onclick="saveEdit(${id})" class="w-full py-5 bg-cyan-600 rounded-2xl font-bold text-white shadow-xl hover:bg-cyan-500 mb-4">SIMPAN PERUBAHAN</button><button onclick="hapusPasien(${id})" class="w-full py-2 text-red-500 text-[10px] font-black uppercase tracking-widest">Hapus Pasien</button></div>
            </div>`;
            document.getElementById('modal-content').innerHTML = html; openPopup();
        }

        function openMgmtDokter() {
            document.getElementById('popup-title').innerText = "Database Dokter";
            let html = `<div class="space-y-4">
                <div class="flex gap-2"><input type="text" id="new-doc" class="flex-1 p-4 rounded-xl font-bold" placeholder="Nama & Gelar"><button onclick="addDokter()" class="px-6 bg-indigo-600 rounded-xl font-bold shadow-lg">+</button></div>
                <div class="space-y-2 max-h-80 overflow-y-auto pr-2 custom-scrollbar">${daftarDokter.map((d, i) => `<div class="p-4 bg-white/5 rounded-xl border border-white/5 flex justify-between items-center group"><div class="flex items-center gap-3"><i class="fa-solid ${getSpec(d).icon} ${getSpec(d).color} text-xs"></i><span class="font-bold">${d}</span></div><button onclick="removeDokter('${d}')" class="text-red-500 opacity-0 group-hover:opacity-100">Hapus</button></div>`).join('')}</div>
            </div>`;
            document.getElementById('modal-content').innerHTML = html; openPopup();
        }

        // --- 7. MODES & TOOLS ---
        let isTVMode = false;
        function toggleTVMode() {
            isTVMode = !isTVMode;
            document.querySelector('aside').classList.toggle('hidden');
            document.querySelector('header').classList.toggle('hidden');
            document.body.style.padding = isTVMode ? '0' : '1.5rem';
            document.getElementById('grid-pasien').classList.toggle('p-10');
            if(isTVMode) {
                const btn = document.createElement('div');
                btn.id = "exit-tv"; btn.onclick = toggleTVMode;
                btn.className = "fixed bottom-8 right-8 w-14 h-14 bg-red-600 rounded-full flex items-center justify-center z-[200] cursor-pointer shadow-2xl animate-bounce";
                btn.innerHTML = '<i class="fa-solid fa-xmark text-xl text-white"></i>';
                document.body.appendChild(btn);
            } else { document.getElementById('exit-tv')?.remove(); }
        }

        function openKalkulator() {
            document.getElementById('popup-title').innerText = "Drug Calculator";
            document.getElementById('modal-content').innerHTML = `<div class="space-y-4"><label>Dosis Diminta (mg/mcg)</label><input type="number" id="calc-d" class="w-full p-4 rounded-xl font-bold" oninput="doCalc()"><div class="grid grid-cols-2 gap-4"><div><label>Sediaan Tersedia</label><input type="number" id="calc-t" class="w-full p-4 rounded-xl font-bold" oninput="doCalc()"></div><div><label>Volume (ml)</label><input type="number" id="calc-i" class="w-full p-4 rounded-xl font-bold" oninput="doCalc()"></div></div><div class="p-8 bg-emerald-500/10 rounded-3xl text-center border border-emerald-500/30 mt-6"><p class="text-[10px] text-emerald-400 font-black tracking-widest mb-2 uppercase">Hasil Ambilan:</p><h2 id="calc-res" class="text-5xl font-header font-black text-emerald-400">0 ml</h2></div></div>`;
            openPopup();
        }
        function doCalc() {
            const d = parseFloat(document.getElementById('calc-d').value) || 0, t = parseFloat(document.getElementById('calc-t').value) || 0, i = parseFloat(document.getElementById('calc-i').value) || 0;
            const res = t > 0 ? (d/t)*i : 0;
            document.getElementById('calc-res').innerText = (res % 1 === 0 ? res : res.toFixed(2)) + " ml";
        }

        function kirimLaporanWA() {
            let text = `*LAPORAN VVIP BHARA DAKSA*%0A📆 ${new Date().toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long'})}%0A---------------------------------------%0A`;
            masterRuangan.forEach((ruang, index) => {
                const p = databasePasien.find(pasien => pasien.ruang === ruang);
                text += `${index + 1}. ${ruang}: ${p ? `*${p.nama.toUpperCase()}* (${p.penjamin})` : '_KOSONG_'}%0A`;
            });
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }
    </script>
</body>
</html>
