<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VVIP Bharadaksa - Command Center v10.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6zBIqZLRpQPBq6psw_Z3oGZ_SK_X0rfQ",
            authDomain: "bhara-daksa.firebaseapp.com",
            databaseURL: "https://bhara-daksa-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bhara-daksa",
            storageBucket: "bhara-daksa.firebasestorage.app",
            messagingSenderId: "765829225964",
            appId: "1:765829225964:web:acb32bf51f69bfe766f4c9",
            measurementId: "G-GCYRJT9SFS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const rooms = [
            "BHARA DAKSA 01", "BHARA DAKSA 02", "BHARA DAKSA 03", "BHARA DAKSA 04",
            "BHARA DAKSA 05-A", "BHARA DAKSA 05-B", "BHARA DAKSA 06-A", "BHARA DAKSA 06-B",
            "BHARA DAKSA 07-A", "BHARA DAKSA 07-B", "BHARA DAKSA 08-A", "BHARA DAKSA 08-B"
        ];

        let patients = {};
        let currentRoom = null;

        onValue(ref(db, 'patients'), (snapshot) => {
            patients = snapshot.val() || {};
            renderGrid();
            updateRunningText();
        });

        onValue(ref(db, 'doctors'), (snapshot) => {
            const docList = snapshot.val() || {};
            renderDoctorUI(docList);
        });

        window.addDoctor = () => {
            const name = document.getElementById('newDocName').value;
            if(name) {
                push(ref(db, 'doctors'), { name: name });
                document.getElementById('newDocName').value = '';
            }
        };

        window.removeDoc = (id) => {
            if(confirm("Hapus dokter dari daftar?")) {
                remove(ref(db, `doctors/${id}`));
            }
        };

        function renderDoctorUI(docs) {
            const listUI = document.getElementById('docList');
            const selectUI = document.getElementById('dpjpSelect');
            listUI.innerHTML = '';
            selectUI.innerHTML = '<option value="">-- PILIH DPJP --</option>';
            for(let id in docs) {
                const doc = docs[id];
                listUI.innerHTML += `<li class="flex justify-between items-center bg-white/5 p-2 rounded-lg text-[10px]"><span class="font-bold text-[#D4AF37]">${doc.name}</span><button onclick="removeDoc('${id}')" class="text-red-500 hover:text-red-300 px-2">✕</button></li>`;
                selectUI.innerHTML += `<option value="${doc.name}">${doc.name}</option>`;
            }
        }

        window.savePatient = (e) => {
            e.preventDefault();
            const r = document.getElementById('ruangSelect').value;
            const data = {
                nama: document.getElementById('nama').value,
                umur: document.getElementById('umur').value,
                diagnosa: document.getElementById('diagnosa').value,
                penjamin: document.getElementById('penjamin').value,
                dpjp: document.getElementById('dpjpSelect').value,
                catatan: "Belum ada catatan."
            };
            set(ref(db, 'patients/' + r.replace(/\s+/g, '_')), data);
            document.getElementById('patientForm').reset();
        };

        window.saveNote = () => {
            update(ref(db, 'patients/' + currentRoom.replace(/\s+/g, '_')), {
                catatan: document.getElementById('noteInput').value || "Belum ada catatan."
            });
            closeModal();
        };

        window.checkoutPatient = () => {
            const key = currentRoom.replace(/\s+/g, '_');
            if(confirm(`Pulangkan pasien ${patients[key].nama}?`)) {
                remove(ref(db, 'patients/' + key));
                closeModal();
            }
        };

        function renderGrid() {
            const grid = document.getElementById('patientGrid');
            const rSelect = document.getElementById('ruangSelect');
            grid.innerHTML = ''; rSelect.innerHTML = '<option value="">-- PILIH BED --</option>';
            let count = 0;

            rooms.forEach(room => {
                const key = room.replace(/\s+/g, '_');
                const p = patients[key];
                if (p) {
                    count++;
                    grid.innerHTML += `
                        <div onclick="openModal('${room}')" class="box-bed box-terisi flex flex-col scale-in">
                            <div class="box-header">${room}</div>
                            <div class="p-4 flex-1 flex flex-col justify-center overflow-hidden">
                                <h4 class="nama-pasien font-black text-white uppercase leading-tight">${p.nama}</h4>
                                <p class="detail-pasien text-blue-200 font-bold">${p.umur} Thn | ${p.penjamin}</p>
                                <p class="detail-pasien text-white font-bold italic mt-1 uppercase">${p.diagnosa || '-'}</p>
                                <p class="dpjp-text font-black mt-2 tracking-tight">${p.dpjp || '-'}</p>
                                <div class="catatan-medis bg-black/40 border-l-2 border-yellow-500 p-2 rounded mt-2 flex-1">
                                    <p class="text-[11px] text-yellow-500 font-bold whitespace-pre-wrap leading-tight">${p.catatan}</p>
                                </div>
                            </div>
                        </div>`;
                } else {
                    rSelect.innerHTML += `<option value="${room}">${room}</option>`;
                    grid.innerHTML += `<div class="box-bed box-kosong flex items-center justify-center opacity-20 border-2 border-dashed border-white/20"><div class="box-header absolute top-0 w-full">${room}</div><p class="text-[10px] font-black text-gray-500">KOSONG</p></div>`;
                }
            });
            const borInfo = `${count}/12 (${Math.round((count/12)*100)}%)`;
            document.getElementById('borStat').innerText = borInfo;
            document.getElementById('borStatTV').innerText = borInfo;
        }

        function updateRunningText() {
            const marqueeText = document.getElementById('marqueeText');
            const separator = " <span class='mx-12 text-black opacity-30'>•</span> ";
            const content = `SELAMAT DATANG DI VVIP BHARA DAKSA ${separator} JAGA KETENANGAN DI AREA RUANG PERAWATAN ${separator} JAGA KEBERSIHAN RUANGAN RAWAT INAP ${separator} RUMKIT BHAYANGKARA PALU MELAYANI DENGAN SEPENUH HATI ${separator} `;
            marqueeText.innerHTML = content + content;
        }

        window.openModal = (r) => {
            currentRoom = r;
            const p = patients[r.replace(/\s+/g, '_')];
            if(!p) return;
            document.getElementById('modalTitle').innerText = r;
            document.getElementById('modalPatientSub').innerText = `${p.nama} (${p.umur} Thn)`;
            document.getElementById('noteInput').value = p.catatan === "Belum ada catatan." ? "" : p.catatan;
            document.getElementById('modalOverlay').style.display = 'flex';
        };
        window.closeModal = () => document.getElementById('modalOverlay').style.display = 'none';

        setInterval(() => {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const dateStr = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('liveClock').innerText = timeStr;
            document.getElementById('liveDay').innerText = dateStr;
            document.getElementById('tvClock').innerText = timeStr;
            document.getElementById('tvDate').innerText = dateStr;
        }, 1000);

        window.toggleTVMode = () => {
            const isTV = document.body.classList.toggle('tv-mode-active');
            if (isTV) {
                if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        };

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) document.body.classList.remove('tv-mode-active');
        });

        window.sendWhatsApp = () => {
            let msg = `*LAPORAN VVIP BHARADAKSA*%0A📅 _${document.getElementById('liveDay').innerText}_%0A📊 *BOR:* ${document.getElementById('borStat').innerText}%0A%0A*🏥 STATUS BED:*%0A`;
            rooms.forEach((r, i) => {
                const p = patients[r.replace(/\s+/g, '_')];
                msg += `${i+1}. ${r}: ${p ? '*TERISI* ('+p.nama+')' : '_KOSONG_' }%0A`;
            });
            msg += `%0A*📝 DETAIL PASIEN:*%0A%0A`;
            for(let key in patients) {
                let p = patients[key];
                msg += `*${key.replace(/_/g, ' ')}*%0A👤 ${p.nama}%0A🩺 ${p.diagnosa}%0A👨‍⚕️ DPJP: ${p.dpjp}%0A📝 Catatan: _${p.catatan.replace(/\n/g, '%0A')}_%0A%0A`;
            }
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        };
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; height: 100vh; overflow: hidden; }
        .sidebar-section { background-color: #0f172a; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
        .input-dark { background-color: #1e293b; border: 1px solid #334155; color: white; font-size: 0.75rem; }
        .box-bed { background-color: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; position: relative; min-height: 200px; transition: 0.3s; cursor: pointer; }
        .box-terisi { background-color: #1e3a8a; border: 1px solid #3b82f6; box-shadow: 0 0 20px rgba(59,130,246,0.15); }
        .box-header { text-align: center; padding: 6px; border-bottom: 1px solid rgba(251,191,36,0.2); color: #fbbf24; font-weight: 800; font-size: 0.75rem; }
        .nama-pasien { font-size: 0.95rem; }
        .detail-pasien { font-size: 11px; }
        .dpjp-text { font-size: 10px; color: #D4AF37; text-transform: none !important; }

        #modalOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 100; align-items: center; justify-content: center; }
        .scale-in { animation: scaleIn 0.2s ease-out; }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        body.tv-mode-active { background: #000; }
        body.tv-mode-active aside { display: none !important; }
        body.tv-mode-active main { width: 100vw !important; height: 100vh !important; padding: 40px 40px 140px 40px !important; display: flex; flex-direction: column; }
        body.tv-mode-active .normal-header { display: none; }
        body.tv-mode-active .box-kosong { display: none !important; }
        body.tv-mode-active .catatan-medis { display: none !important; }
        
        body.tv-mode-active #patientGrid { 
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)) !important; 
            gap: 25px; flex: 1; align-content: start;
        }
        body.tv-mode-active .box-bed { 
            min-height: 220px !important; border-width: 5px; 
            background: linear-gradient(135deg, #1e3a8a 0%, #020617 100%);
        }
        body.tv-mode-active .box-header { font-size: 1.8rem; padding: 12px; }
        body.tv-mode-active .nama-pasien { font-size: 2.8rem; line-height: 1.1; margin-bottom: 10px; word-wrap: break-word; }
        body.tv-mode-active .detail-pasien { font-size: 1.5rem; }
        body.tv-mode-active .dpjp-text { font-size: 1.5rem; margin-top: 15px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); color: #D4AF37; text-transform: none !important; }

        /* --- TICKER BAR v10.0 --- */
        .ticker-wrapper {
            display: none; position: fixed; bottom: 0; left: 0; width: 100%; 
            height: 120px; /* Diperbesar dari 100px ke 120px */
            background: #fbbf24; z-index: 9999;
        }
        body.tv-mode-active .ticker-wrapper { display: flex; align-items: center; }
        
        .ticker-label {
            background: #ef4444; 
            color: #fff; height: 100%; display: flex; align-items: center;
            padding: 0 40px; font-weight: 900; 
            font-size: 2.5rem; /* Label juga sedikit diperbesar */
            z-index: 10;
        }
        
        .ticker-content-box { flex: 1; overflow: hidden; display: flex; align-items: center; }
        
        .marquee-modern {
            display: inline-block; white-space: nowrap; 
            font-weight: 900; 
            font-size: 3.5rem; /* DIUBAH KE 3.5 REM SESUAI PERMINTAAN */
            color: #000; 
            animation: marquee-v9 35s linear infinite;
        }
        @keyframes marquee-v9 { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        @media (max-width: 768px) { body { overflow-y: auto; height: auto; } .flex-row-mobile { flex-direction: column; } aside { width: 100% !important; } }
    </style>
</head>
<body class="flex flex-row-mobile p-4 gap-6">

    <div class="ticker-wrapper">
        <div class="ticker-label">INFO</div>
        <div class="ticker-content-box">
            <div class="marquee-modern" id="marqueeText"></div>
        </div>
    </div>

    <button onclick="toggleTVMode()" class="fixed bottom-32 right-8 z-[10000] bg-blue-600 text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-all">
        <i class="fas fa-tv text-2xl"></i>
    </button>

    <aside class="w-1/4 flex flex-col">
        <div class="mb-4">
            <h1 class="text-xl font-black text-yellow-500 italic uppercase">VVIP BHARA DAKSA</h1>
            <p id="liveDay" class="text-[10px] text-blue-400 font-bold uppercase"></p>
            <p id="liveClock" class="text-2xl font-black font-mono"></p>
        </div>

        <div class="sidebar-section">
            <h3 class="text-[9px] text-yellow-500 font-bold uppercase mb-2">Input Pasien</h3>
            <form id="patientForm" onsubmit="savePatient(event)" class="space-y-2">
                <input type="text" id="nama" placeholder="NAMA PASIEN" class="input-dark w-full p-2 rounded-lg" required>
                <div class="flex gap-2">
                    <input type="number" id="umur" placeholder="Umur" class="input-dark w-1/3 p-2 rounded-lg">
                    <select id="penjamin" class="input-dark w-2/3 p-2 rounded-lg">
                        <option>BPJS</option><option>UMUM</option><option>POLRI</option><option>ASURANSI</option>
                    </select>
                </div>
                <select id="dpjpSelect" class="input-dark w-full p-2 rounded-lg" required></select>
                <input type="text" id="diagnosa" placeholder="Diagnosa Utama" class="input-dark w-full p-2 rounded-lg">
                <select id="ruangSelect" class="input-dark w-full p-2 rounded-lg" required></select>
                <button type="submit" class="bg-yellow-500 text-black w-full py-2.5 rounded-xl font-bold text-xs uppercase shadow-lg">Simpan Pasien</button>
            </form>
        </div>

        <div class="sidebar-section">
            <h3 class="text-[9px] text-yellow-500 font-bold uppercase mb-2">Manajemen DPJP</h3>
            <div class="flex gap-1 mb-3">
                <input type="text" id="newDocName" placeholder="Nama Dokter..." class="input-dark flex-1 p-2 rounded-lg">
                <button onclick="addDoctor()" class="bg-cyan-600 px-3 rounded-lg font-bold">+</button>
            </div>
            <ul id="docList" class="space-y-1 max-h-32 overflow-y-auto pr-1"></ul>
        </div>

        <button onclick="sendWhatsApp()" class="bg-green-600 w-full py-3.5 rounded-xl font-bold text-xs uppercase flex items-center justify-center gap-2 shadow-lg">
            <i class="fab fa-whatsapp text-lg"></i> Laporan WA
        </button>
    </aside>

    <main class="flex-1">
        <div class="normal-header mb-3 flex justify-between items-end px-2">
            <span class="text-[9px] text-yellow-500 font-bold uppercase tracking-widest">Command Center BHARA DAKSA</span>
            <span class="text-xs font-black uppercase">BOR: <span id="borStat" class="text-blue-400"></span></span>
        </div>

        <div class="tv-mode-active:flex hidden justify-between items-start mb-10">
            <div class="bg-slate-900/40 p-8 rounded-3xl border-l-8 border-yellow-500">
                <h1 class="text-6xl font-black text-white uppercase italic leading-none tracking-tighter">VVIP BHARADAKSA</h1>
                <p id="tvDate" class="text-3xl text-blue-400 font-bold uppercase mt-4"></p>
            </div>
            <div class="text-right">
                <p id="tvClock" class="text-9xl font-black font-mono text-white leading-none tracking-tighter"></p>
                <p class="text-3xl font-black uppercase text-slate-500 mt-4">BOR: <span id="borStatTV" class="text-yellow-500"></span></p>
            </div>
        </div>
        
        <div id="patientGrid" class="grid grid-cols-4 gap-4"></div>
    </main>

    <div id="modalOverlay" onclick="if(event.target == this) closeModal()">
        <div class="bg-[#0f172a] border border-blue-500 p-8 rounded-3xl w-full max-w-sm">
            <h2 id="modalTitle" class="text-2xl font-black text-yellow-500 uppercase"></h2>
            <p id="modalPatientSub" class="text-xs text-blue-300 font-bold mb-4"></p>
            <textarea id="noteInput" rows="7" class="input-dark w-full p-4 rounded-xl mb-4 text-xs leading-relaxed" placeholder="Ketik catatan medis..."></textarea>
            <div class="flex gap-3 mb-6">
                <button onclick="closeModal()" class="flex-1 bg-slate-800 py-3 rounded-xl font-bold text-xs">BATAL</button>
                <button onclick="saveNote()" class="flex-1 bg-yellow-500 text-black py-3 rounded-xl font-bold text-xs uppercase">SIMPAN</button>
            </div>
            <div class="border-t border-white/5 pt-4 flex justify-center">
                <button onclick="checkoutPatient()" class="text-red-500 border border-red-500/30 px-4 py-2 rounded-lg text-[9px] font-bold uppercase">🚪 Kosongkan Bed</button>
            </div>
        </div>
    </div>
</body>
</html>
