<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VVIP Bharadaksa - Smart Command Center v11.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6zBIqZLRpQPBq6psw_Z3oGZ_SK_X0rfQ",
            authDomain: "bhara-daksa.firebaseapp.com",
            databaseURL: "https://bhara-daksa-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bhara-daksa",
            storageBucket: "bhara-daksa.firebasestorage.app",
            messagingSenderId: "765829225964",
            appId: "1:765829225964:web:acb32bf51f69bfe766f4c9",
            measurementId: "G-GCYRJT9SFS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const rooms = [
            "VVIP 01", "VVIP 02", "VVIP 03", "VVIP 04",
            "BHARA DAKSA 05-A", "BHARA DAKSA 05-B", "BHARA DAKSA 06-A", "BHARA DAKSA 06-B",
            "BHARA DAKSA 07-A", "BHARA DAKSA 07-B", "BHARA DAKSA 08-A", "BHARA DAKSA 08-B"
        ];

        let patients = {};
        let currentRoom = null;

        // --- DATABASE IKON SPESIALIS (DIPERBARUI) ---
        const specialistIcons = {
            "SP.BS": { icon: "fa-brain-circuit", color: "text-orange-500", label: "Bedah Saraf" },
            "SP.KJ": { icon: "fa-brain", color: "text-emerald-400", label: "Jiwa" },
            "SP.OT": { icon: "fa-bone", color: "text-slate-200", label: "Orthopedi" },
            "SP.B":  { icon: "fa-scalpel", color: "text-red-500", label: "Bedah" },
            "SP.A":  { icon: "fa-baby", color: "text-pink-400", label: "Anak" },
            "SP.PD": { icon: "fa-stethoscope", color: "text-blue-300", label: "Penyakit Dalam" },
            "SP.JP": { icon: "fa-heart-pulse", color: "text-red-600", label: "Jantung" },
            "SP.N":  { icon: "fa-brain", color: "text-purple-400", label: "Saraf" },
            "SP.OG": { icon: "fa-person-pregnant", color: "text-teal-300", label: "Obgyn" },
            "SP.THT":{ icon: "fa-ear-listen", color: "text-orange-400", label: "THT" },
            "SP.M":  { icon: "fa-eye", color: "text-cyan-400", label: "Mata" },
            "SP.AN": { icon: "fa-lungs", color: "text-slate-400", label: "Anestesi" },
            "DEFAULT": { icon: "fa-user-md", color: "text-[#D4AF37]", label: "Dokter" }
        };

        // --- FUNGSI DETEKSI LOGO (LOGIKA PRIORITAS) ---
        function getSpec(name) {
            if (!name) return specialistIcons.DEFAULT;
            const n = name.toUpperCase().replace(/\s/g, ''); // Hapus spasi untuk deteksi akurat
            
            // 1. Cek yang paling spesifik dulu (Sp.BS & Sp.KJ)
            if (n.includes("SP.BS")) return specialistIcons["SP.BS"];
            if (n.includes("SP.KJ")) return specialistIcons["SP.KJ"];
            if (n.includes("SP.OT")) return specialistIcons["SP.OT"];
            
            // 2. Cek Sp.B (Bedah) - dipastikan tidak tertukar dengan Sp.BS
            if (n.includes("SP.B") && !n.includes("SP.BS")) return specialistIcons["SP.B"];
            
            // 3. Cek Spesialis lain
            if (n.includes("SP.A")) return specialistIcons["SP.A"];
            if (n.includes("SP.PD")) return specialistIcons["SP.PD"];
            if (n.includes("SP.JP")) return specialistIcons["SP.JP"];
            if (n.includes("SP.N")) return specialistIcons["SP.N"];
            if (n.includes("SP.OG")) return specialistIcons["SP.OG"];
            if (n.includes("SP.THT")) return specialistIcons["SP.THT"];
            if (n.includes("SP.M")) return specialistIcons["SP.M"];
            if (n.includes("SP.AN")) return specialistIcons["SP.AN"];
            
            return specialistIcons.DEFAULT;
        }
        onValue(ref(db, 'patients'), (snapshot) => {
            patients = snapshot.val() || {};
            renderGrid();
            updateRunningText();
        });

        onValue(ref(db, 'doctors'), (snapshot) => {
            const docList = snapshot.val() || {};
            renderDoctorUI(docList);
        });

        window.addDoctor = () => {
            const name = document.getElementById('newDocName').value;
            if(name) {
                push(ref(db, 'doctors'), { name: name });
                document.getElementById('newDocName').value = '';
            }
        };

        window.removeDoc = (id) => {
            if(confirm("Hapus dokter dari daftar?")) {
                remove(ref(db, `doctors/${id}`));
            }
        };

        function renderDoctorUI(docs) {
            const listUI = document.getElementById('docList');
            const selectUI = document.getElementById('dpjpSelect');
            if(!listUI || !selectUI) return;
            listUI.innerHTML = '';
            selectUI.innerHTML = '<option value="">-- PILIH DPJP --</option>';
            for(let id in docs) {
                const doc = docs[id];
                const s = getSpec(doc.name);
                listUI.innerHTML += `
                    <li class="flex justify-between items-center bg-white/5 p-2 rounded-lg text-[10px]">
                        <div class="flex items-center gap-2">
                            <i class="fas ${s.icon} ${s.color} w-4 text-center"></i>
                            <span class="font-bold text-[#D4AF37]">${doc.name}</span>
                        </div>
                        <button onclick="removeDoc('${id}')" class="text-red-500 hover:text-red-300 px-2">✕</button>
                    </li>`;
                selectUI.innerHTML += `<option value="${doc.name}">${doc.name}</option>`;
            }
        }

        window.savePatient = (e) => {
            e.preventDefault();
            const r = document.getElementById('ruangSelect').value;
            if(!r) return alert("Pilih Bed Terlebih Dahulu");
            const data = {
                nama: document.getElementById('nama').value,
                umur: document.getElementById('umur').value,
                diagnosa: document.getElementById('diagnosa').value,
                penjamin: document.getElementById('penjamin').value,
                dpjp: document.getElementById('dpjpSelect').value,
                catatan: "Belum ada catatan."
            };
            set(ref(db, 'patients/' + r.replace(/\s+/g, '_')), data);
            document.getElementById('patientForm').reset();
        };

        window.saveNote = () => {
            const roomKey = currentRoom.replace(/\s+/g, '_');
            update(ref(db, 'patients/' + roomKey), {
                diagnosa: document.getElementById('editDiagnosa').value.toUpperCase(),
                catatan: document.getElementById('noteInput').value || "Belum ada catatan."
            });
            closeModal();
        };

        window.checkoutPatient = () => {
            const key = currentRoom.replace(/\s+/g, '_');
            if(confirm(`Pulangkan pasien ${patients[key].nama}?`)) {
                remove(ref(db, 'patients/' + key));
                closeModal();
            }
        };

        function renderGrid() {
            const grid = document.getElementById('patientGrid');
            const rSelect = document.getElementById('ruangSelect');
            if(!grid || !rSelect) return;
            grid.innerHTML = ''; rSelect.innerHTML = '<option value="">-- PILIH BED --</option>';
            let count = 0;

            rooms.forEach(room => {
                const key = room.replace(/\s+/g, '_');
                const p = patients[key];
                if (p) {
                    count++;
                    const s = getSpec(p.dpjp);
                    grid.innerHTML += `
                        <div onclick="openModal('${room}')" class="box-bed box-terisi flex flex-col scale-in relative overflow-hidden h-full group">
                            <div class="box-header-terisi">${room}</div>
                            <div class="p-4 md:p-6 flex-1 flex flex-col justify-center z-10 min-h-0">
                                <h4 class="nama-pasien font-black text-white uppercase leading-none truncate">${p.nama}</h4>
                                <div class="flex items-center gap-3 mt-2">
                                    <span class="detail-pasien text-blue-400 font-bold">${p.umur} Thn</span>
                                    <span class="h-1.5 w-1.5 rounded-full bg-white/20"></span>
                                    <span class="detail-pasien text-yellow-500 font-bold">${p.penjamin}</span>
                                </div>
                                <p class="detail-pasien text-white font-black italic mt-1 uppercase line-clamp-1 bg-blue-900/40 px-2 py-0.5 rounded border border-blue-500/30 shadow-inner">
                                    ${p.diagnosa || '-'}
                                </p>
                                <div class="dpjp-container mt-2 pt-2 border-t border-white/10 flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-lg bg-black/50 flex items-center justify-center border border-white/10 group-hover:border-yellow-500/50 transition-all shadow-xl">
                                        <i class="fas ${s.icon} ${s.color} text-xl"></i>
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest leading-none">Dokter Penanggung Jawab</p>
                                        <p class="dpjp-text font-black text-[#D4AF37] truncate leading-tight mt-1 uppercase group-hover:text-yellow-400">${p.dpjp || '-'}</p>
                                        <p class="text-[8px] ${s.color} font-bold opacity-80 leading-none mt-0.5">${s.label}</p>
                                    </div>
                                </div>
                                <div class="catatan-medis-box bg-black/30 border-l-4 border-yellow-600 p-2 rounded-lg mt-3 flex-1 overflow-hidden">
                                    <p class="text-[11px] text-yellow-500/90 font-bold line-clamp-2 leading-tight italic">"${p.catatan}"</p>
                                </div>
                            </div>
                            <div class="absolute top-3 right-3 w-3 h-3 rounded-full bg-red-500 shadow-[0_0_15px_#ef4444]"></div>
                        </div>`;
                } else {
                    rSelect.innerHTML += `<option value="${room}">${room}</option>`;
                    grid.innerHTML += `
                        <div class="box-kosong-new flex items-center justify-center rounded-2xl relative overflow-hidden group min-h-[180px]">
                            <div class="box-header-kosong absolute top-0 w-full">${room}</div>
                            <div class="text-center opacity-40">
                                <i class="fas fa-bed text-slate-700 text-2xl mb-2 block"></i>
                                <p class="label-kosong text-[10px] font-black uppercase tracking-tighter">BED TERSEDIA</p>
                            </div>
                            <div class="absolute top-3 right-3 w-2 h-2 rounded-full bg-green-500/20"></div>
                        </div>`;
                }
            });
            const borInfo = `${count}/12 (${Math.round((count/12)*100)}%)`;
            if(document.getElementById('borStat')) document.getElementById('borStat').innerText = borInfo;
            if(document.getElementById('borStatTV')) document.getElementById('borStatTV').innerText = borInfo;
        }

        window.updateRunningText = () => {
            const marqueeText = document.getElementById('marqueeText');
            if(!marqueeText) return;
            const content = `SELAMAT DATANG DI VVIP BHARA DAKSA • JAGA KETENANGAN DI AREA RUANG PERAWATAN • JAGA KEBERSIHAN RUANGAN RAWAT INAP • RUMKIT BHAYANGKARA PALU MELAYANI DENGAN SEPENUH HATI • `;
            marqueeText.innerHTML = (content + content).toUpperCase();
        }

        window.openModal = (r) => {
            currentRoom = r;
            const p = patients[r.replace(/\s+/g, '_')];
            if(!p) return;
            document.getElementById('modalTitle').innerText = r;
            document.getElementById('modalPatientSub').innerText = `${p.nama} (${p.umur} Thn)`;
            document.getElementById('editDiagnosa').value = p.diagnosa || "";
            document.getElementById('noteInput').value = p.catatan === "Belum ada catatan." ? "" : p.catatan;
            document.getElementById('modalOverlay').style.display = 'flex';
        };
        window.closeModal = () => document.getElementById('modalOverlay').style.display = 'none';

        setInterval(() => {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const dateStr = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'short' });
            if(document.getElementById('liveClock')) document.getElementById('liveClock').innerText = timeStr;
            if(document.getElementById('liveDay')) document.getElementById('liveDay').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            if(document.getElementById('tvClockTicker')) document.getElementById('tvClockTicker').innerText = timeStr;
            if(document.getElementById('tvDateTicker')) document.getElementById('tvDateTicker').innerText = dateStr.toUpperCase();
        }, 1000);

        window.toggleTVMode = () => {
            const isTV = document.body.classList.toggle('tv-mode-active');
            if (isTV) {
                if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        };

        window.sendWhatsApp = () => {
            let msg = `*LAPORAN VVIP BHARADAKSA*%0A📊 *BOR:* ${document.getElementById('borStat').innerText}%0A%0A`;
            rooms.forEach((r, i) => {
                const p = patients[r.replace(/\s+/g, '_')];
                msg += `${i+1}. ${r}: ${p ? '*TERISI* ('+p.nama+')' : '_KOSONG_' }%0A`;
            });
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        };
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; overflow: hidden; height: 100vh; position: relative; }
        .tv-wallpaper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background-image: url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-position: center; display: none; }
        .tv-wallpaper::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(2, 6, 23, 0.7) 0%, rgba(2, 6, 23, 0.95) 100%); }
        body.tv-mode-active { background-color: transparent !important; }
        body.tv-mode-active .tv-wallpaper { display: block; animation: fadeIn 1.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .app-container { display: flex; flex-direction: row; gap: 1.5rem; padding: 1.5rem; height: 100vh; overflow: hidden; position: relative; z-index: 10; }
        aside { width: 22%; height: 100%; overflow-y: auto; padding-right: 10px; border-right: 1px solid rgba(255,255,255,0.05); }
        main { flex: 1; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-section { background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
        .input-dark { background-color: #1e293b; border: 1px solid #334155; color: white; font-size: 0.85rem; }
        .box-bed { background-color: #0f172a; border-radius: 20px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .box-terisi { background: linear-gradient(145deg, #1e3a8a, #0f172a); border: 1px solid #3b82f6; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .box-kosong-new { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid rgba(255,255,255,0.03); }
        .box-header-terisi { text-align: center; padding: 6px; border-bottom: 1px solid rgba(251,191,36,0.2); color: #fbbf24; font-weight: 800; font-size: 0.7rem; background: rgba(0,0,0,0.2); }
        .box-header-kosong { text-align: center; padding: 6px; color: #475569; font-weight: 800; font-size: 0.7rem; border-bottom: 1px solid rgba(255,255,255,0.03); }
        #modalOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 99999; align-items: center; justify-content: center; padding: 20px; }
        body.tv-mode-active aside { display: none !important; }
        body.tv-mode-active main { width: 100vw !important; height: 100vh !important; padding: 25px 40px 110px 40px !important; }
        body.tv-mode-active .normal-header, body.tv-mode-active .box-kosong-new, body.tv-mode-active .catatan-medis-box { display: none !important; }
        body.tv-mode-active #patientGrid { display: grid !important; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)) !important; grid-auto-rows: 1fr; gap: 25px; flex: 1; min-height: 0; align-content: start; }
        body.tv-mode-active .box-bed { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 2px solid rgba(59, 130, 246, 0.4); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        body.tv-mode-active .box-header-terisi { font-size: 1.6rem; padding: 12px; background: rgba(0,0,0,0.3); }
        body.tv-mode-active .nama-pasien { font-size: 2.5rem; letter-spacing: -1px; }
        body.tv-mode-active .detail-pasien { font-size: 1.1rem; }
        body.tv-mode-active .dpjp-text { font-size: 1.4rem; color: #fbbf24; }
        body.tv-mode-active .dpjp-container i { font-size: 2.5rem; }
        .ticker-wrapper { display: none; position: fixed; bottom: 0; left: 0; width: 100%; height: 90px; background: #fbbf24; z-index: 9999; align-items: center; border-top: 5px solid #000; }
        body.tv-mode-active .ticker-wrapper { display: flex; }
        .ticker-clock-box { background: #000; color: #fff; height: 100%; padding: 0 35px; display: flex; flex-direction: column; justify-content: center; text-align: center; border-right: 5px solid #fbbf24; min-width: 300px; }
        #tvClockTicker { font-size: 3.2rem; font-weight: 900; font-family: monospace; color: #fbbf24; line-height: 1; }
        #tvDateTicker { font-size: 1.1rem; font-weight: 800; color: #64748b; margin-top: 2px; }
        .marquee-modern { font-weight: 900; font-size: 2.8rem; color: #000; animation: marquee-anim 25s linear infinite; white-space: nowrap; }
        @keyframes marquee-anim { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body>

    <div class="tv-wallpaper"></div>

    <div class="ticker-wrapper">
        <div class="ticker-clock-box">
            <div id="tvClockTicker">00:00:00</div>
            <div id="tvDateTicker">SENIN, 01 JAN</div>
        </div>
        <div class="ticker-info text-black font-black px-6 text-2xl">RSBP:</div>
        <div class="ticker-content flex-1 overflow-hidden">
            <div class="marquee-modern" id="marqueeText"></div>
        </div>
    </div>

    <button onclick="toggleTVMode()" class="fixed bottom-24 right-8 z-[10000] bg-blue-600 hover:bg-blue-500 text-white w-16 h-16 rounded-full shadow-[0_0_30px_rgba(37,99,235,0.5)] flex items-center justify-center hover:scale-110 active:scale-95 transition-all border-4 border-white/10">
        <i class="fas fa-tv text-2xl"></i>
    </button>

    <div class="app-container">
        <aside>
            <div class="mb-8">
                <h1 class="text-2xl font-black text-yellow-500 italic uppercase leading-none tracking-tighter">VVIP BHARADAKSA</h1>
                <p id="liveDay" class="text-[11px] text-blue-400 font-bold uppercase mt-2 tracking-widest"></p>
                <p id="liveClock" class="text-4xl font-black font-mono mt-1 text-white"></p>
            </div>

            <div class="sidebar-section">
                <form id="patientForm" onsubmit="savePatient(event)" class="space-y-4">
                    <input type="text" id="nama" placeholder="NAMA PASIEN" class="input-dark w-full p-4 rounded-xl uppercase font-black tracking-tight" required>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="umur" placeholder="Umur" class="input-dark w-full p-4 rounded-xl font-bold">
                        <select id="penjamin" class="input-dark w-full p-4 rounded-xl font-black">
                            <option>BPJS</option><option>UMUM</option><option>POLRI</option><option>ASURANSI</option>
                        </select>
                    </div>
                    <select id="dpjpSelect" class="input-dark w-full p-4 rounded-xl font-black" required></select>
                    <input type="text" id="diagnosa" placeholder="Diagnosa Awal" class="input-dark w-full p-4 rounded-xl uppercase font-bold">
                    <select id="ruangSelect" class="input-dark w-full p-4 rounded-xl font-black" required></select>
                    <button type="submit" class="bg-yellow-500 hover:bg-yellow-400 text-black w-full py-4 rounded-xl font-black text-sm uppercase transition-colors shadow-lg">Simpan Pasien</button>
                </form>
            </div>

            <div class="sidebar-section">
                <div class="flex gap-2 mb-4">
                    <input type="text" id="newDocName" placeholder="Contoh: dr. Andi, Sp.OT" class="input-dark flex-1 p-3 rounded-xl font-bold">
                    <button onclick="addDoctor()" class="bg-cyan-600 hover:bg-cyan-500 px-5 rounded-xl font-bold">+</button>
                </div>
                <ul id="docList" class="space-y-2 max-h-40 overflow-y-auto pr-2"></ul>
            </div>

            <button onclick="sendWhatsApp()" class="bg-green-600 hover:bg-green-500 w-full py-4 rounded-xl font-black text-xs uppercase flex items-center justify-center gap-3 transition-all shadow-lg">
                <i class="fab fa-whatsapp text-xl"></i> Kirim Laporan WA
            </button>
        </aside>

        <main>
            <div class="normal-header mb-6 flex justify-between items-end px-2">
                <div>
                    <h2 class="text-2xl font-black uppercase tracking-tighter">Monitoring Bed VVIP</h2>
                    <span class="text-xs text-yellow-500 font-bold uppercase tracking-[0.3em]">Okupansi Terkini (BOR): <span id="borStat" class="text-white ml-2"></span></span>
                </div>
            </div>

            <div class="tv-mode-active:flex hidden justify-between items-center mb-6 px-2 border-b-2 border-white/10 pb-4">
                <h1 class="text-5xl font-black text-white italic tracking-tighter">VVIP BHARADAKSA <span class="text-yellow-500 ml-4 font-normal not-italic opacity-50">| MONITORING SYSTEM</span></h1>
                <div class="text-right">
                    <p class="text-xl font-bold text-slate-500 uppercase leading-none tracking-widest">OKUPANSI BED</p>
                    <p id="borStatTV" class="text-5xl font-black text-yellow-500 mt-1"></p>
                </div>
            </div>
            
            <div id="patientGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 overflow-hidden"></div>
        </main>
    </div>

    <div id="modalOverlay" onclick="if(event.target == this) closeModal()">
        <div class="bg-[#0f172a] border border-blue-500/30 w-full max-w-lg rounded-3xl overflow-hidden shadow-2xl">
            <div class="bg-blue-600 p-6 flex justify-between items-center">
                <div>
                    <h2 id="modalTitle" class="text-2xl font-black text-white leading-none">RUANG</h2>
                    <p id="modalPatientSub" class="text-blue-100 font-bold mt-1 text-sm uppercase tracking-wider"></p>
                </div>
                <button onclick="closeModal()" class="text-white/50 hover:text-white text-2xl">✕</button>
            </div>
            <div class="p-8 space-y-6">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Update Diagnosa</label>
                    <input type="text" id="editDiagnosa" class="input-dark w-full p-4 rounded-xl uppercase font-bold text-white">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Catatan Perkembangan</label>
                    <textarea id="noteInput" rows="4" class="input-dark w-full p-4 rounded-xl text-white font-medium italic"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4 pt-4">
                    <button onclick="checkoutPatient()" class="bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white py-4 rounded-xl font-black text-xs uppercase transition-all border border-red-600/30">Checkout</button>
                    <button onclick="saveNote()" class="bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-black text-xs uppercase transition-all shadow-lg">Simpan</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
